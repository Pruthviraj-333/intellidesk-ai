name: IntelliDesk AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Code Quality ──────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-dev.txt"

      - name: Install linting tools
        run: pip install -r requirements-dev.txt

      - name: "flake8 — PEP8 compliance"
        run: flake8 app/ tests/ --statistics --count

      - name: "black — formatting check"
        run: black app/ tests/ --check --diff

      - name: "isort — import ordering"
        run: isort app/ tests/ --check-only --diff

  # ── 2. Security Scan ─────────────────────────────────────────────────────────
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-dev.txt"

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: "bandit — code security analysis"
        run: |
          bandit -r app/ -ll -ii \
            --skip B101,B601 \
            --exclude app/tests \
            -f json -o bandit-report.json || true
          bandit -r app/ -ll -ii --skip B101,B601 --exclude app/tests

      - name: "safety — dependency vulnerability check"
        run: safety check -r requirements.txt --output text
        continue-on-error: true  # Non-blocking; treat as advisory

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: backend/bandit-report.json

  # ── 3. Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend

    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-unit-test-secret
      JWT_SECRET_KEY: ci-unit-test-jwt
      DATABASE_URL: sqlite:///:memory:
      REDIS_URL: redis://localhost:6379/0
      GROQ_API_KEY: dummy-key-for-ci
      GMAIL_USER: ci@test.com
      GMAIL_APP_PASSWORD: dummy
      CLOUDINARY_URL: cloudinary://key:secret@cloud
      FRONTEND_URL: http://localhost:5173
      CHROMA_HOST: localhost
      CHROMA_PORT: "8001"
      EMBEDDING_MODEL: all-MiniLM-L6-v2

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: "Run unit tests"
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            -v --tb=short \
            -m "not integration"

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: backend/coverage-unit.xml

  # ── 4. Integration Tests ─────────────────────────────────────────────────────
  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: intellidesk_test
          POSTGRES_USER: intellidesk
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-integration-test-secret
      JWT_SECRET_KEY: ci-integration-test-jwt
      DATABASE_URL: postgresql://intellidesk:test_password@localhost:5432/intellidesk_test
      REDIS_URL: redis://localhost:6379/0
      GROQ_API_KEY: dummy-key-for-ci
      GMAIL_USER: ci@test.com
      GMAIL_APP_PASSWORD: dummy
      CLOUDINARY_URL: cloudinary://key:secret@cloud
      FRONTEND_URL: http://localhost:5173
      CHROMA_HOST: localhost
      CHROMA_PORT: "8001"
      EMBEDDING_MODEL: all-MiniLM-L6-v2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: "Run integration tests"
        run: |
          pytest tests/integration/ \
            --cov=app \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            -v --tb=short

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: backend/coverage-integration.xml

  # ── 5. Coverage Gate ─────────────────────────────────────────────────────────
  coverage:
    name: "📊 Coverage Report"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage/unit/

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: integration-coverage-report
          path: coverage/integration/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/unit/coverage-unit.xml,coverage/integration/coverage-integration.xml
          flags: backend
          name: intellidesk-backend
          fail_ci_if_error: false
          verbose: true

  # ── 6. Frontend Unit Tests ───────────────────────────────────────────────────
  frontend-unit-tests:
    name: "🧪 Frontend Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  # ── 7. Frontend E2E Tests ────────────────────────────────────────────────────
  frontend-e2e-tests:
    name: "🎭 Frontend E2E Tests"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: intellidesk_test
          POSTGRES_USER: intellidesk
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FLASK_ENV: development
      SECRET_KEY: ci-e2e-test-secret
      JWT_SECRET_KEY: ci-e2e-test-jwt
      DATABASE_URL: postgresql://intellidesk:test_password@localhost:5432/intellidesk_test
      REDIS_URL: redis://localhost:6379/0
      GROQ_API_KEY: dummy-key-for-ci
      GMAIL_USER: ci@test.com
      GMAIL_APP_PASSWORD: dummy
      CLOUDINARY_URL: cloudinary://key:secret@cloud
      FRONTEND_URL: http://localhost:5173
      CHROMA_HOST: localhost
      CHROMA_PORT: "8001"
      EMBEDDING_MODEL: all-MiniLM-L6-v2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run backend database migrations and seed
        working-directory: backend
        run: |
          flask db upgrade
          flask seed-db

      - name: Start backend server in background
        working-directory: backend
        run: |
          FLASK_APP=wsgi.py flask run --port=8000 &
          sleep 3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # ── 8. Docker Build (main branch only) ───────────────────────────────────────
  docker-build:
    name: "🐳 Docker Build Verification"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Build backend Docker image"
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: intellidesk-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_COMMIT=${{ github.sha }}

      - name: "Verify image starts cleanly"
        run: |
          docker run --rm \
            -e FLASK_ENV=production \
            -e SECRET_KEY=docker-build-test \
            -e JWT_SECRET_KEY=docker-build-test-jwt \
            -e DATABASE_URL=postgresql://test:test@localhost/test \
            intellidesk-backend:${{ github.sha }} \
            python -c "from app import create_app; print('✅ App factory OK')"
        continue-on-error: true

  # ── 9. Release Summary ────────────────────────────────────────────────────────
  summary:
    name: "📋 Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests, integration-tests, frontend-unit-tests, frontend-e2e-tests]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          echo "## 🚀 IntelliDesk AI — CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint & Format | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Backend Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Backend Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Frontend Unit Tests | ${{ needs.frontend-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 Frontend E2E Tests | ${{ needs.frontend-e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

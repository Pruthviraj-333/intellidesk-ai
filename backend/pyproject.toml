[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | migrations
  | __pycache__
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip = ["migrations", ".venv", "venv"]
known_first_party = ["app"]
known_third_party = [
    "flask", "sqlalchemy", "marshmallow", "celery",
    "groq", "chromadb", "sentence_transformers",
    "reportlab", "openpyxl", "pandas",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "unit: unit tests (no external dependencies)",
    "integration: integration tests (requires database)",
    "slow: slow tests (skip with -m 'not slow')",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/migrations/*",
    "*/tests/*",
    "*/test_*",
    "app/__init__.py",
    "wsgi.py",
]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 1
fail_under = 15
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "@abstractmethod",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true
exclude = ["migrations/", "tests/"]
